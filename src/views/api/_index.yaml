version: "1.0"
namespace: wippy.views.api
entries:
    - name: list_pages
      kind: function.lua
      meta:
        comment: Lists all virtual pages with metadata
        description: Pages listing endpoint
        router: api_router
      source: file://list_pages.lua
      imports:
        page_registry: wippy.views:page_registry
      method: handler
      modules:
        - http
      pool:
        size: 4
        workers: 4
    - name: list_pages.endpoint
      kind: http.endpoint
      meta:
        comment: Endpoint that lists all accessible pages
        description: CMS pages listing endpoint
        router: api_router
      func: list_pages
      method: GET
      path: /pages/list
    - name: list_components
      kind: function.lua
      meta:
        comment: Lists all view components with metadata
        description: Components listing endpoint
        router: api_router
      source: file://list_components.lua
      imports:
        component_registry: wippy.views:component_registry
      method: handler
      modules:
        - http
      pool:
        size: 4
        workers: 4
    - name: list_components.endpoint
      kind: http.endpoint
      meta:
        comment: Endpoint that lists all accessible view components
        description: View components listing endpoint
        router: api_router
      func: list_components
      method: GET
      path: /components/list
    - name: render
      kind: function.lua
      meta:
        comment: Returns the rendered content of a specific virtual page by ID
        description: Page rendering endpoint
        router: api_router
      source: file://render.lua
      imports:
        page_registry: wippy.views:page_registry
        renderer: wippy.views:renderer
        resource_registry: wippy.views:resource_registry
      method: handler
      modules:
        - http
      pool:
        size: 4
    - name: render.endpoint
      kind: http.endpoint
      meta:
        comment: Endpoint that renders a virtual page by ID
        description: CMS page renderer endpoint
        router: api_router
      func: render
      method: GET
      path: /pages/content/{id}
    - name: public_url
      kind: function.lua
      meta:
        comment: Returns base URL for component page assets
        router: api_router
      source: file://public_url.lua
      imports:
        page_registry: wippy.views:page_registry
      method: handler
      modules:
        - http
    - name: public_url.endpoint
      kind: http.endpoint
      meta:
        comment: Component page public URL endpoint
        router: api_router
      func: public_url
      method: GET
      path: /pages/public/{id}
    - name: list_routes
      kind: function.lua
      meta:
        comment: Returns mountRoute → pageId map for pages claiming top-level URLs
        description: Pages mount route listing endpoint
        router: api_router
      source: file://list_routes.lua
      imports:
        page_registry: wippy.views:page_registry
      method: handler
      modules:
        - http
      pool:
        size: 4
        workers: 4
    - name: list_routes.endpoint
      kind: http.endpoint
      meta:
        comment: Endpoint that lists all accessible mount routes
        description: View pages mount routes listing endpoint
        router: api_router
      func: list_routes
      method: GET
      path: /pages/routes
