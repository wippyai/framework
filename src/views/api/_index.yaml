version: "1.0"
namespace: wippy.views.api
entries:
    - name: list_pages
      kind: function.lua
      meta:
        comment: Lists all virtual pages with metadata
        description: Pages listing endpoint
        router: api_router
      source: file://list_pages.lua
      imports:
        page_registry: wippy.views:page_registry
      method: handler
      modules:
        - http
      security:
        actor:
          id: wippy.views.api:list_pages
        policies:
          - wippy.views:public_registry_runtime
      pool:
        size: 4
        workers: 4
    - name: list_pages.endpoint
      kind: http.endpoint
      meta:
        comment: Endpoint that lists all accessible pages
        description: CMS pages listing endpoint
        router: api_router
      func: list_pages
      method: GET
      path: /pages/list
    - name: list_components
      kind: function.lua
      meta:
        comment: Lists all view components with metadata
        description: Components listing endpoint
        router: api_router
      source: file://list_components.lua
      imports:
        component_registry: wippy.views:component_registry
        bundled_meta: wippy.views:bundled_meta
      method: handler
      modules:
        - http
      security:
        actor:
          id: wippy.views.api:list_components
        policies:
          - wippy.views:public_registry_runtime
          - wippy.views:public_env_runtime
          - wippy.views:public_metadata_http_runtime
          - wippy.views:public_metadata_private_ip_runtime
          - wippy.views:public_metadata_store_runtime
      pool:
        size: 4
        workers: 4
    - name: list_components.endpoint
      kind: http.endpoint
      meta:
        comment: Endpoint that lists all accessible view components
        description: View components listing endpoint
        router: api_router
      func: list_components
      method: GET
      path: /components/list
    - name: find_by_tag
      kind: function.lua
      meta:
        comment: Resolves a custom-element tag name to its registered view.component metadata
        description: View component tag-name lookup endpoint
        router: api_router
      source: file://find_by_tag.lua
      imports:
        component_registry: wippy.views:component_registry
        bundled_meta: wippy.views:bundled_meta
      method: handler
      modules:
        - http
      security:
        actor:
          id: wippy.views.api:find_by_tag
        policies:
          - wippy.views:public_registry_runtime
          - wippy.views:public_env_runtime
          - wippy.views:public_metadata_http_runtime
          - wippy.views:public_metadata_private_ip_runtime
          - wippy.views:public_metadata_store_runtime
      pool:
        size: 4
        workers: 4
    - name: find_by_tag.endpoint
      kind: http.endpoint
      meta:
        comment: Endpoint that resolves a tag_name to a single view.component
        description: View component by-tag lookup endpoint
        router: api_router
      func: find_by_tag
      method: GET
      path: /components/by-tag/{tag}
    - name: render
      kind: function.lua
      meta:
        comment: Returns the rendered content of a specific virtual page by ID
        description: Page rendering endpoint
        router: api_router
      source: file://render.lua
      imports:
        page_registry: wippy.views:page_registry
        renderer: wippy.views:renderer
        resource_registry: wippy.views:resource_registry
        bundled_meta: wippy.views:bundled_meta
      method: handler
      modules:
        - http
      security:
        actor:
          id: wippy.views.api:render
        policies:
          - wippy.views:public_registry_runtime
          - wippy.views:public_env_runtime
          - wippy.views:public_metadata_http_runtime
          - wippy.views:public_metadata_private_ip_runtime
          - wippy.views:public_metadata_store_runtime
          - wippy.views:public_data_func_runtime
      pool:
        size: 4
    - name: render.endpoint
      kind: http.endpoint
      meta:
        comment: Endpoint that renders a virtual page by ID
        description: CMS page renderer endpoint
        router: api_router
      func: render
      method: GET
      path: /pages/content/{id}
    - name: public_url
      kind: function.lua
      meta:
        comment: Returns base URL for component page assets
        router: api_router
      source: file://public_url.lua
      imports:
        page_registry: wippy.views:page_registry
      method: handler
      modules:
        - http
      security:
        actor:
          id: wippy.views.api:public_url
        policies:
          - wippy.views:public_registry_runtime
          - wippy.views:public_env_runtime
    - name: public_url.endpoint
      kind: http.endpoint
      meta:
        comment: Component page public URL endpoint
        router: api_router
      func: public_url
      method: GET
      path: /pages/public/{id}
    - name: list_routes
      kind: function.lua
      meta:
        comment: Returns mountRoute → pageId map for pages claiming top-level URLs
        description: Pages mount route listing endpoint
        router: api_router
      source: file://list_routes.lua
      imports:
        page_registry: wippy.views:page_registry
      method: handler
      modules:
        - http
      security:
        actor:
          id: wippy.views.api:list_routes
        policies:
          - wippy.views:public_registry_runtime
      pool:
        size: 4
        workers: 4
    - name: list_routes.endpoint
      kind: http.endpoint
      meta:
        comment: Endpoint that lists all accessible mount routes
        description: View pages mount routes listing endpoint
        router: api_router
      func: list_routes
      method: GET
      path: /pages/routes
    # Web-Fragments gateway (EE2-2313). Serves the reframing contract for a
    # view.page rendered as a fragment: reframed stub (Sec-Fetch-Dest: iframe),
    # the app HTML with the fragment proxy + <base> injected (empty/document),
    # and asset proxying (everything else). Delivery-mode wrapper — render.lua
    # is untouched. Auth-agnostic: the injected proxy handshakes the host for config.
    - name: fragment_gateway
      kind: function.lua
      meta:
        comment: Web-Fragments gateway — reframing contract + asset proxy for a fragment-mode view.page
        description: Fragment gateway endpoint
        router: fragment_router
      source: file://fragment_gateway.lua
      imports:
        page_registry: wippy.views:page_registry
      method: handler
      modules:
        - http
        - http_client
        - registry
        - json
      security:
        actor:
          id: wippy.views.api:fragment_gateway
        policies:
          - wippy.views:public_registry_runtime
          # Required: page_registry.resolve_base_url reads PUBLIC_API_URL to turn a
          # page's relative url/base_path into an ABSOLUTE origin. Without this the
          # read is denied, base_url stays relative, and the document fetch is then
          # rejected by public_metadata_http_runtime (which only allows http(s)://*).
          - wippy.views:public_env_runtime
          - wippy.views:public_metadata_http_runtime
          - wippy.views:public_metadata_private_ip_runtime
      pool:
        size: 4
        workers: 4
    - name: fragment_gateway.endpoint
      kind: http.endpoint
      meta:
        comment: Web-Fragments gateway endpoint (reframing + asset proxy)
        description: Fragment reframing contract endpoint
        router: fragment_router
      func: fragment_gateway
      method: GET
      # Router-relative: fragment_router supplies the /@fragment prefix, so the
      # full served path is /@fragment/{id}/{path...} (top-level, not under /api/public).
      path: /{id}/{path...}
