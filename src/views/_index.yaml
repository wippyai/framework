version: "1.0"
namespace: wippy.views
entries:
    - name: definition
      kind: ns.definition
      meta:
        description: UI view components
        title: Views
    - name: api_router
      kind: ns.requirement
      meta:
        description: Public API router for view endpoints
        parent: app.deps:__dependency.wippy.views
      targets:
        - entry: wippy.views.api:list_pages
          path: .meta.router
        - entry: wippy.views.api:list_pages.endpoint
          path: .meta.router
        - entry: wippy.views.api:list_components
          path: .meta.router
        - entry: wippy.views.api:list_components.endpoint
          path: .meta.router
        - entry: wippy.views.api:find_by_tag
          path: .meta.router
        - entry: wippy.views.api:find_by_tag.endpoint
          path: .meta.router
        - entry: wippy.views.api:render
          path: .meta.router
        - entry: wippy.views.api:render.endpoint
          path: .meta.router
        - entry: wippy.views.api:public_url
          path: .meta.router
        - entry: wippy.views.api:public_url.endpoint
          path: .meta.router
        - entry: wippy.views.api:list_routes
          path: .meta.router
        - entry: wippy.views.api:list_routes.endpoint
          path: .meta.router
    - name: fragment_router
      kind: ns.requirement
      meta:
        description: Dedicated top-level router for the Web-Fragments gateway — its own /@fragment prefix (CDN-routable, independent of the dynamic /api/public surface) and NOT behind token_auth (the gateway is auth-agnostic; the fragment proxy handshakes the host for auth client-side).
        parent: app.deps:__dependency.wippy.views
      targets:
        - entry: wippy.views.api:fragment_gateway
          path: .meta.router
        - entry: wippy.views.api:fragment_gateway.endpoint
          path: .meta.router
    - name: public_api_url
      kind: env.variable
      meta:
        comment: Public API URL for resolving component base URLs
      variable: PUBLIC_API_URL
    - name: env_storage
      kind: ns.requirement
      meta:
        description: Environment storage for PUBLIC_API_URL
      targets:
        - entry: wippy.views:public_api_url
          path: .storage
    - name: env_contract
      kind: contract.definition
      meta:
        description: Contract interface for environment variable providers and consumers
        name: Environment Variable Provider Contract
        version: "1.0"
      methods:
        - description: Load environment variable mappings from provider
          input_schemas:
            - definition: |
                {
                  "type": "object",
                  "properties": {
                    "filter": {
                      "type": "object",
                      "description": "Optional filter criteria for mappings"
                    }
                  },
                  "additionalProperties": false
                }
              format: application/schema+json
          name: load_mappings
          output_schemas:
            - definition: |
                {
                  "type": "object",
                  "properties": {
                    "success": {"type": "boolean"},
                    "mappings": {
                      "type": "array",
                      "items": {
                        "type": "object",
                        "properties": {
                          "id": {"type": "string"},
                          "priority": {"type": "integer"},
                          "mappings": {"type": "object"}
                        },
                        "required": ["id", "priority", "mappings"]
                      }
                    },
                    "error": {"type": "string"}
                  },
                  "required": ["success"]
                }
              format: application/schema+json
        - description: Resolve environment variable values from context
          input_schemas:
            - definition: |
                {
                  "type": "object",
                  "properties": {
                    "context": {
                      "type": "object",
                      "description": "Context mapping from keys to environment variable names"
                    }
                  },
                  "required": ["context"]
                }
              format: application/schema+json
          name: resolve_env_values
          output_schemas:
            - definition: |
                {
                  "type": "object",
                  "properties": {
                    "success": {"type": "boolean"},
                    "resolved": {
                      "type": "object",
                      "description": "Resolved environment variable values"
                    },
                    "error": {"type": "string"}
                  },
                  "required": ["success"]
                }
              format: application/schema+json
    - name: env_contract_binding
      kind: contract.binding
      meta:
        comment: Contract binding for environment variable provider
        description: Implements the environment variable provider contract using env_loader library
      contracts:
        - contract: wippy.views:env_contract
          methods:
            load_mappings: wippy.views:env_loader
            resolve_env_values: wippy.views:env_loader
    - name: env_loader
      kind: library.lua
      meta:
        comment: Framework environment variable mapping loader
        description: Core framework library for loading and resolving environment variable mappings from registry
        type: framework.library
      source: file://env_loader.lua
      modules:
        - registry
        - env
    - name: env_mapping_schema
      kind: registry.entry
      meta:
        description: Schema definition for view.env_mapping registry entries
        name: Environment Variable Mapping Schema
        type: schema.definition
        version: "1.0"
      priority_conventions:
        application_mappings: 20-29
        environment_overrides: 30+
        framework_defaults: 0-9
        system_overrides: 10-19
      schema:
        properties:
            mappings:
                additionalProperties:
                    type: string
                description: Key-value pairs mapping view context names to environment variables
                type: object
            priority:
                default: 0
                description: Priority order for merging mappings (higher priority overrides lower)
                maximum: 100
                minimum: 0
                type: integer
        required:
            - mappings
        type: object
    - name: page_registry
      kind: library.lua
      meta:
        comment: Registry for managing virtual pages
        description: Provides functions to find and access virtual pages
      source: file://page_registry.lua
      modules:
        - registry
        - security
        - env
    - name: component_registry
      kind: library.lua
      meta:
        comment: Registry for managing view components (web components)
        description: Provides functions to find and access view components
      source: file://component_registry.lua
      modules:
        - registry
        - security
        - env
    - name: renderer
      kind: library.lua
      meta:
        comment: Page renderer for virtual pages
        description: Renders virtual pages with data and resources
      source: file://renderer.lua
      imports:
        env_loader: wippy.views:env_loader
        page_registry: wippy.views:page_registry
        resource_registry: wippy.views:resource_registry
      modules:
        - templates
        - funcs
        - json
        - env
    - name: resource_registry
      kind: library.lua
      meta:
        comment: Registry for managing page resources
        description: Provides functions to find and access page resources
      source: file://resource_registry.lua
      modules:
        - registry
    - name: bundled_meta
      kind: library.lua
      meta:
        comment: Fetches consumer-built wippy-meta.json (file:// refs resolved at build time)
        description: |
          Reads the wippy-meta.json that @wippy-fe/vite-plugin emits next to a
          consumer's app.html / index.js. Used by /pages/content/{id},
          /components/list, and /components/by-tag/{tag} as the single source
          of truth for view.page / view.component metadata when present.
          Callers fall back to YAML-synthesis when fetch returns nil + nil.
          A process-wide deprecation warning fires the FIRST time an entry is
          seen without bundled meta (deduplicated via the shared `bundled_meta_warn`
          memory store so each handler-pool worker doesn't re-warn the same id).
      source: file://bundled_meta.lua
      imports:
        page_registry: wippy.views:page_registry
        component_registry: wippy.views:component_registry
      modules:
        - http_client
        - json
        - store
    - name: bundled_meta_warn
      kind: store.memory
      meta:
        comment: |
          Process-wide dedup of "no wippy-meta.json" deprecation warnings.
          Each entry id is logged at most once per wippy process lifetime,
          regardless of which handler-pool worker observes the miss.
      max_size: 1000
      cleanup_interval: "1h"
    - name: public_registry_runtime
      kind: security.policy
      meta:
        comment: Public view API handlers may discover declared view pages, components, resources, and env mappings.
      policy:
        resources: '*'
        actions:
          - registry.get
          - registry.find
        effect: allow
    - name: public_env_runtime
      kind: security.policy
      meta:
        comment: Public view rendering may resolve browser-safe environment values.
      policy:
        resources:
          - PUBLIC_*
          - userspace.dataflow.env:web_host_origin
        actions:
          - env.get
        effect: allow
    - name: public_metadata_http_runtime
      kind: security.policy
      meta:
        comment: Public view API handlers may fetch bundled wippy-meta.json from declared component/page URLs.
      policy:
        resources:
          - http://*
          - https://*
        actions:
          - http_client.request
        effect: allow
    - name: public_metadata_private_ip_runtime
      kind: security.policy
      meta:
        comment: Public view metadata self-fetch supports app-local component/page URLs.
      policy:
        resources: '*'
        actions:
          - http_client.private_ip
        effect: allow
    - name: public_metadata_store_runtime
      kind: security.policy
      meta:
        comment: Public view metadata fallback warnings are deduplicated through the package-owned memory store.
      policy:
        resources:
          - wippy.views:bundled_meta_warn
        actions:
          - store.get
          - store.key.get
          - store.key.set
        effect: allow
    - name: public_data_func_runtime
      kind: security.policy
      meta:
        comment: Template-backed public views may call data functions declared in view namespaces.
      policy:
        resources:
          - '*.views:*'
        actions:
          - funcs.call
        effect: allow
    - name: dep.wippy.test
      kind: ns.dependency
      meta:
        scope: dev
      component: wippy/test
      version: '*'
    - name: page_registry_test
      kind: function.lua
      meta:
        type: test
        suite: views
        comment: Page registry tests
      source: file://page_registry_test.lua
      method: run
      imports:
        test: wippy.test:test
        page_registry: wippy.views:page_registry
      modules:
        - registry

    - name: component_registry_test
      kind: function.lua
      meta:
        type: test
        suite: views
        comment: Component registry tests
      source: file://component_registry_test.lua
      method: run
      imports:
        test: wippy.test:test
        page_registry: wippy.views:page_registry
        component_registry: wippy.views:component_registry
      modules:
        - registry

    - name: resource_registry_test
      kind: function.lua
      meta:
        type: test
        suite: views
        comment: Resource registry tests
      source: file://resource_registry_test.lua
      method: run
      imports:
        test: wippy.test:test
        resource_registry: wippy.views:resource_registry
      modules:
        - registry

    - name: env_loader_test
      kind: function.lua
      meta:
        type: test
        suite: views
        comment: Env loader tests
      source: file://env_loader_test.lua
      method: run
      imports:
        test: wippy.test:test
        env_loader: wippy.views:env_loader
      modules:
        - registry

    - name: bundled_meta_test
      kind: function.lua
      meta:
        type: test
        suite: views
        comment: Bundled-meta projection tests (YAML-first precedence + nil-vs-empty override)
      source: file://bundled_meta_test.lua
      method: run
      imports:
        test: wippy.test:test
        bundled_meta: wippy.views:bundled_meta

    - name: public_security_test
      kind: function.lua
      meta:
        type: test
        suite: views
        comment: Public view API security policy tests
      source: file://public_security_test.lua
      method: run
      imports:
        test: wippy.test:test
      modules:
        - security
