version: "1.0"
namespace: wippy.relay.security

entries:
  # wippy.relay.security:root
  - name: root
    kind: registry.entry
    meta:
      comment: Full relay system access for central hub
    
  # wippy.relay.security:root.policy
  - name: root.policy
    kind: security.policy
    meta:
      comment: Root policy for relay central hub
    groups:
      - wippy.relay.security:root
    policy:
      resources: '*'
      actions: '*'
      effect: allow

  # wippy.relay.security:user_hub_registry
  - name: user_hub_registry
    kind: security.policy
    meta:
      comment: User relay hubs own their canonical user.<actor_id> registry name for named fanout.
    groups: []
    policy:
      resources:
        - user.*
      actions:
        - process.registry.register
        - process.registry.unregister
      effect: allow

  # wippy.relay.security:user_hub_messaging
  - name: user_hub_messaging
    kind: security.policy
    meta:
      comment: User-scoped hub processes deliver payloads to client pids. process.send is checked against the raw destination pid, which has no matchable pattern.
    groups: []
    policy:
      resources:
        - '*'
      actions:
        - process.send
      effect: allow
    
