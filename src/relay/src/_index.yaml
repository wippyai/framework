version: "1.0"
namespace: wippy.relay

entries:
  - name: definition
    kind: ns.definition
    meta:
      title: Relay
      description: WebSocket relay and messaging infrastructure

  # Requirements
  - name: application_host
    kind: ns.requirement
    meta:
      description: "Host ID for the application processes"
    targets:
      - entry: wippy.relay.env:host
        path: ".default"
      - entry: central.service
        path: ".host"
      - entry: central.service
        path: ".lifecycle.depends_on +="
      - entry: user
        path: ".meta.default_host"

  - name: env_storage
    kind: ns.requirement
    meta:
      description: "Environment variable storage location"
    targets:
      - entry: wippy.relay.env:host
        path: ".storage"
      - entry: wippy.relay.env:max_connections_per_user
        path: ".storage"
      - entry: wippy.relay.env:queue_multiplier
        path: ".storage"
      - entry: wippy.relay.env:user_hub_inactivity_timeout
        path: ".storage"
      - entry: wippy.relay.env:user_security_scope
        path: ".storage"
    default: "wippy.relay.env:envs"

  - name: user_security_scope
    kind: ns.requirement
    meta:
      description: "Application security scope/group applied to user relay hubs"
    targets:
      - entry: wippy.relay.env:user_security_scope
        path: ".default"
      - entry: wippy.relay.security:user_hub_registry
        path: ".groups +="

  - name: max_connections_per_user
    kind: ns.requirement
    meta:
      description: "Maximum WebSocket connections allowed per user"
    targets:
      - entry: wippy.relay.env:max_connections_per_user
        path: ".default"
    default: "5"

  - name: queue_multiplier
    kind: ns.requirement
    meta:
      description: "Message queue size multiplier (queue = connections × multiplier)"
    targets:
      - entry: wippy.relay.env:queue_multiplier
        path: ".default"
    default: "100"

  - name: user_hub_inactivity_timeout
    kind: ns.requirement
    meta:
      description: "How long user hubs stay alive with no clients"
    targets:
      - entry: wippy.relay.env:user_hub_inactivity_timeout
        path: ".default"
    default: 7200s

  # Dependencies
  - name: dep.wippy.test
    kind: "ns.dependency"
    meta:
      description: "Testing component"
    component: "wippy/test"
    version: ">=v0.2.0"

  # wippy.relay:central
  - name: central
    kind: process.lua
    meta:
      comment: Central hub that manages user-specific relay hubs
      depends_on:
        - ns:wippy.relay.env
        - ns:wippy.relay.security
    source: file://central.lua
    modules:
      - time
      - json
      - security
      - logger
    imports:
      consts: wippy.relay:consts
      plugin_discovery: wippy.relay.discovery:plugins
    method: run

  # wippy.relay:central.service
  - name: central.service
    kind: process.service
    meta:
      comment: Central relay hub service
    lifecycle:
      depends_on: []
      auto_start: true
      security:
        actor:
          id: relay.central
        groups:
          - wippy.relay.security:root
    process: wippy.relay:central

  # wippy.relay:consts
  - name: consts
    kind: library.lua
    meta:
      comment: Configuration constants and utilities
    source: file://consts.lua
    modules:
      - env
      - time

  # wippy.relay:user
  - name: user
    kind: process.lua
    meta:
      comment: User-specific hub for WebSocket connections and plugins
      depends_on:
        - ns:wippy.relay.env
        - ns:wippy.relay.security
    source: file://user.lua
    modules:
      - time
      - json
      - uuid
      - logger
      - pg
    imports:
      consts: wippy.relay:consts
    method: run

  # wippy.relay:consts_test
  - name: consts_test
    kind: function.lua
    meta:
      name: Relay Constants Test
      type: test
      suite: relay
      comment: Tests relay configuration constants and derived values
      group: Relay
      tags:
        - relay
        - constants
        - tests
    source: file://consts_test.lua
    imports:
      consts: wippy.relay:consts
      test: wippy.test:test
    modules:
      - env
      - time
    method: run

  # wippy.relay:user_test
  - name: user_test
    kind: function.lua
    meta:
      name: Relay User Hub Test
      type: test
      suite: relay
      comment: Tests user-hub websocket payload compatibility.
      group: Relay
      tags:
        - relay
        - user
        - tests
    source: file://user_test.lua
    imports:
      consts: wippy.relay:consts
      test: wippy.test:test
      user: wippy.relay:user
    modules:
      - time
      - security
    method: run

  # wippy.relay:central_test
  - name: central_test
    kind: function.lua
    meta:
      name: Relay Central Identity Test
      type: test
      suite: relay
      comment: Tests user identity and scope propagation from websocket metadata.
      group: Relay
      tags:
        - relay
        - identity
        - tests
    source: file://central_test.lua
    imports:
      central: wippy.relay:central
      test: wippy.test:test
    modules:
      - time
    method: run
