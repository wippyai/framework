version: "1.0"
namespace: app

entries:
  - name: user
    kind: registry.entry
    meta:
      comment: Policy group for user relay hubs under test

  - name: user.messaging
    kind: security.policy
    meta:
      comment: Lets user-scoped hub processes message clients during tests
    groups:
      - app:user
    policy:
      resources: '*'
      actions:
        - process.send
      effect: allow
