version: "1.0"
namespace: wippy.wc-content-kit

entries:
  - name: definition
    kind: ns.definition
    readme: file://README.md
    meta:
      title: Content-rendering Web Components Kit
      description: |
        Ships three auto-registered Wippy web components for rendering rich
        content in chat, artifacts, and pages: <wippy-mermaid>, <wippy-markdown>,
        <wippy-chartjs>. Drop the module into an app via ns.dependency and the
        tags are auto-registered on next start — no copy-paste, no per-app
        wiring. See README.md for full per-tag reference and examples.

  # Infrastructure requirements
  - name: server
    kind: ns.requirement
    meta:
      description: HTTP server that hosts the static asset bundles
    targets:
      - entry: wippy.wc-content-kit:static
        path: .meta.server

  # Static files (built bundles for all three components)
  - name: public_files
    kind: fs.directory
    meta:
      comment: Built web component bundles (mermaid, markdown, chartjs)
    directory: ./public/
    mode: "0755"

  - name: static
    kind: http.static
    meta:
      comment: Serves wc-content-kit web component bundles
      server: server
    fs: public_files
    directory: /
    path: /wippy/wc-content-kit
    options:
      mime_types:
        .js: application/javascript
        .css: text/css
        .map: application/json

  # ── Web Component Registrations ──
  - name: wippy-mermaid
    kind: registry.entry
    meta:
      type: view.component
      name: wippy-mermaid
      title: Mermaid Diagram
      tag_name: wippy-mermaid
      entry_point: index.js
      announced: true
      secure: false
      auto_register: true
      url: /wippy/wc-content-kit
      base_path: mermaid
      description: |
        Renders any Mermaid v11 diagram. Pass the diagram source via the
        `definition` attribute (NOT as text content). Supports flowchart,
        sequenceDiagram, classDiagram, stateDiagram, erDiagram, journey,
        gantt, pie, mindmap, timeline, gitGraph, quadrantChart,
        requirementDiagram, sankey, xychart, block, packet, kanban,
        architecture, radar.

        Flowchart, sequence, class, ER, state, and xychart use a fast
        primary engine. Less common types fall back to a heavier renderer
        that loads on first use; the diagram appears after a brief delay.

        Examples:

        <wippy-mermaid definition="flowchart LR
          Start([User opens app]) --> Auth{Token present?}
          Auth -- yes --> Home[Home screen]
          Auth -- no --> Login[Login form]" />

        <wippy-mermaid definition="sequenceDiagram
          participant U as User
          participant H as Host
          participant C as Child
          U->>H: load
          H->>C: SetConfig
          C-->>H: GetConfig" />

        <wippy-mermaid definition="pie title Where time goes
          &quot;Sleep&quot; : 33
          &quot;Work&quot;  : 30
          &quot;Other&quot; : 37" />

        Notes: newlines in `definition` must reach the attribute as real
        newlines. Render errors surface as an inline error banner — the host
        never throws. Use `transparent="false"` on dark backgrounds for a
        solid card.
    props:
      type: object
      properties:
        definition:
          type: string
          default: ""
          description: Mermaid v11 diagram source. Newlines must be real LF characters in the attribute value.
        transparent:
          type: boolean
          default: true
          description: Whether the diagram background is transparent (set false to render on a solid card)

  - name: wippy-markdown
    kind: registry.entry
    meta:
      type: view.component
      name: wippy-markdown
      title: Markdown Viewer
      tag_name: wippy-markdown
      entry_point: index.js
      announced: true
      secure: false
      auto_register: true
      url: /wippy/wc-content-kit
      base_path: markdown
      description: |
        Renders GitHub-Flavored Markdown to safe HTML. Pass markdown source
        via the `content` attribute. Output is sanitized with sanitize-html
        using a conservative default allowlist; widen it via `allowed-tags`
        and `allowed-attributes` only for trusted content.

        Features: headings, bold/italic, ordered/bulleted lists (nested),
        tables with alignment, fenced code blocks with language hints,
        inline code, blockquotes, links, images, autolinks, strikethrough,
        horizontal rules. Note: GFM task lists (`- [x]`) and footnotes are
        NOT enabled by default (require markdown-it plugins not bundled here).

        Examples:

        <wippy-markdown content="# Hello
        This is **bold** and *italic* with [a link](https://example.com)." />

        <wippy-markdown content="## Steps
        1. First
        2. Second
           - Nested bullet
        " />

        <wippy-markdown content="| Col A | Col B |
        |:------|------:|
        | left  |  right |" />

        Security: do NOT widen `allowed-tags` for untrusted markdown — anything
        you allow can be emitted by the source. Default allowlist is safe for
        arbitrary input.
    props:
      type: object
      properties:
        content:
          type: string
          default: ""
          description: Markdown source text to render (GFM)
        allowed-tags:
          type: array
          items:
            type: string
          default: []
          description: |
            Override sanitizer tag whitelist (empty = built-in defaults).
            WARNING: widening this is a security decision — only do it for
            trusted input.
        allowed-attributes:
          type: string
          default: ""
          description: 'JSON-stringified {tag: [attr,...]} map for sanitize-html (empty = defaults)'

  - name: wippy-chartjs
    kind: registry.entry
    meta:
      type: view.component
      name: wippy-chartjs
      title: Chart.js (universal)
      tag_name: wippy-chartjs
      entry_point: index.js
      announced: true
      secure: false
      auto_register: true
      url: /wippy/wc-content-kit
      base_path: chartjs
      description: |
        Renders ANY Chart.js v4 chart from a single tag. Pass the chart type
        via `type` and the full Chart.js Data object as a JSON string via
        `data`. `options` and `plugins` are JSON-string passthroughs to
        Chart.js.

        Supported types: line (trends over time), bar (categorical
        comparison), doughnut / pie (parts of a whole, ≤7 categories),
        radar (multi-axis comparison), polarArea (categorical with
        magnitude), scatter (x/y point clouds), bubble (x/y/r 3-dim data).

        When a dataset omits `backgroundColor` (and `borderColor` for
        line/bar/radar/scatter/bubble), the component fills it from the
        host's CSS palette (`--p-primary-500`, `--p-danger-500`,
        `--p-warn-500`, `--p-secondary-500`, `--p-accent-500`, plus
        300-tone variants). Override per-dataset to force exact colors.

        Examples:

        <wippy-chartjs
          type="bar"
          data='{"labels":["Q1","Q2","Q3","Q4"],"datasets":[{"label":"Revenue","data":[12,19,7,22]}]}'
          options='{"responsive":true,"plugins":{"title":{"display":true,"text":"2026 Revenue"}}}' />

        <wippy-chartjs
          type="line"
          data='{"labels":["Jan","Feb","Mar","Apr"],"datasets":[{"label":"Users","data":[100,150,180,210]}]}' />

        <wippy-chartjs
          type="doughnut"
          data='{"labels":["Chrome","Safari","Firefox","Edge"],"datasets":[{"data":[63,18,4,15]}]}' />

        <wippy-chartjs
          type="radar"
          data='{"labels":["Speed","Reliability","Comfort","Safety","Efficiency"],"datasets":[{"label":"Model A","data":[8,9,7,8,6]},{"label":"Model B","data":[7,8,9,7,8]}]}' />

        <wippy-chartjs
          type="scatter"
          data='{"datasets":[{"label":"Set A","data":[{"x":1,"y":2},{"x":2,"y":4},{"x":3,"y":3}]}]}' />

        <wippy-chartjs
          type="bubble"
          data='{"datasets":[{"label":"Population","data":[{"x":10,"y":20,"r":15},{"x":20,"y":10,"r":8}]}]}' />

        Notes: `data` must be valid JSON — escape inner quotes correctly when
        embedding in HTML attributes. JSON parse errors render as an inline
        error banner instead of crashing. Size the chart by setting
        `style="height:300px"` on the wrapping element since the canvas is
        responsive by default. Bring custom Chart.js plugins via the
        `plugins` JSON array; the component bundles only the built-in
        registerables.
    props:
      type: object
      properties:
        type:
          type: string
          enum: ["line", "bar", "doughnut", "pie", "radar", "polarArea", "scatter", "bubble"]
          default: "doughnut"
          description: Chart.js chart type
        data:
          type: string
          default: ""
          description: 'JSON-stringified Chart.js Data object: { labels?, datasets: [{label?, data, ...}] }'
        options:
          type: string
          default: ""
          description: JSON-stringified Chart.js Options object (optional)
        plugins:
          type: string
          default: ""
          description: JSON-stringified array of Chart.js plugin definitions (optional)
