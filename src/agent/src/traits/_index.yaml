version: "1.0"
namespace: wippy.agent.traits

entries:
  # wippy.agent.traits:init_time_aware
  - name: init_time_aware
    kind: function.lua
    meta:
      type: function
      comment: Initializes time-aware trait with current rounded time context
    source: file://init_time_aware.lua
    modules:
      - time
      - ctx
    method: execute
    
  # wippy.agent.traits:init_time_aware_test
  - name: init_time_aware_test
    kind: function.lua
    meta:
      name: Init Time Aware Trait Test
      type: test
      comment: Tests the time-aware trait initialization and prompt generation
      group: Agent Framework
      tags:
        - traits
        - time
        - tests
    source: file://init_time_aware_test.lua
    modules:
      - time
      - ctx
    imports:
      test: wippy.test:test
      init_time_aware: wippy.agent.traits:init_time_aware
    method: run_tests

  # wippy.agent.traits:time_aware
  - name: time_aware
    kind: registry.entry
    meta:
      name: Time Aware
      type: agent.trait
      comment: Adds current time context to agent for time-aware responses with cache stability
      tags:
        - time
        - context
        - rounded
        - cache_stable
    build_func_id: wippy.agent.traits:init_time_aware
    context:
      time_interval: 15
      timezone: UTC
    