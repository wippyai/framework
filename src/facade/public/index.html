<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <title>Wippy</title>
    <script src="/@wippy-fe/loading.js"></script>
    <style>
        #facade-overlay {
            position: fixed; top: 0; left: 0; width: 100%; z-index: 99999;
            height: 100vh; height: 100dvh;
            transition: opacity 0.12s ease-out;
        }
        #facade-overlay.fade-out { opacity: 0; pointer-events: none; }
    </style>
</head>
<body>
<div id="app"></div>
<div id="facade-overlay">
    <wippy-loading title="Loading..."></wippy-loading>
</div>
<script>
    (async function () {
    var STORAGE_KEY = '@wippy_token_info';
    var overlay = document.getElementById('facade-overlay');

    function hideOverlay() {
        overlay.classList.add('fade-out');
        setTimeout(function () { overlay.remove(); }, 150);
    }

    function showError(title, detail) {
        var el = document.createElement('wippy-error');
        el.setAttribute('title', title);
        if (detail) el.setAttribute('message', detail);
        overlay.textContent = '';
        overlay.appendChild(el);
    }

    try {
        var res = await fetch('/api/public/facade/config');
        if (!res.ok) {
            showError('Failed to load configuration', 'Server returned ' + res.status + '. Check that the backend is running.');
            throw new Error('config fetch failed: ' + res.status);
        }
        var cfg = await res.json();

        var stored = localStorage.getItem(STORAGE_KEY);
        if (!stored) { window.location.href = cfg.login_path || '/login.html'; throw new Error('no token'); }

        var token;
        try { token = JSON.parse(stored).token; }
        catch (e) { window.location.href = cfg.login_path || '/login.html'; throw new Error('bad token'); }

        // Fallback env URLs if backend didn't provide them
        if (!cfg.env.APP_API_URL) {
            cfg.env.APP_API_URL = window.location.origin;
            cfg.env.APP_AUTH_API_URL = window.location.origin;
        }
        if (!cfg.env.APP_WEBSOCKET_URL) {
            var wsProto = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            cfg.env.APP_WEBSOCKET_URL = wsProto + '//' + window.location.host;
        }
        if (!cfg.routePrefix) {
            cfg.routePrefix = cfg.env.APP_API_URL;
        }

        // Inject import map BEFORE any module loading
        try {
            var mapRes = await fetch(cfg.facade_url + '/import-map.json');
            if (mapRes.ok) {
                var mapData = await mapRes.json();
                var mapScript = document.createElement('script');
                mapScript.type = 'importmap';
                mapScript.textContent = JSON.stringify(mapData);
                document.head.appendChild(mapScript);
            }
        } catch (e) {
            console.warn('Failed to load import map:', e);
        }

        // Now safe to load modules — import map is already in the DOM
        try {
            await import(cfg.facade_url + '/module.js');
        } catch (importErr) {
            showError('Failed to load frontend bundle', 'Could not load ' + cfg.facade_url + '/module.js — ' + importErr.message);
            throw importErr;
        }

        if (typeof window.initWippyApp !== 'function') {
            showError('Frontend bundle error', 'initWippyApp not found after loading module. The bundle may be incompatible.');
            throw new Error('initWippyApp not found');
        }

        // Backend returns config in wippy-context-2.0 shape — just add auth + schema
        var events = window.initWippyApp({
            $schema: cfg.facade_url + '/schemas/wippy-context-2.0.xsd',
            auth: { token: token, expiresAt: new Date(Date.now() + 86400000).toISOString() },
            env: cfg.env,
            routePrefix: cfg.routePrefix,
            apiRoutes: cfg.apiRoutes,
            theming: cfg.theming,
            hostConfig: cfg.hostConfig,
            context: { resourceId: '', resourceType: 'page' },
        }, '#app');

        var loginPath = cfg.login_path || '/login.html';

        // Hide overlay when initial route resolves and page starts rendering
        events.on('load', hideOverlay);

            // Embedded log receiver — listens to globalEvents 'log' emitted by module.js.
            // Console transport always active; Sentry loaded from CDN if PUBLIC_SENTRY_DSN is set.
            (function () {
                var states = {};
                var transports = [];

                function sourceKey(s) { return (s.layer || 'child') + ':' + (s.resourceId || 'unknown'); }
                function getState(key) {
                    if (!states[key]) states[key] = { bc: [], ctx: {}, tags: {} };
                    return states[key];
                }

                // Console transport (colored tags, inline data)
                var TAG_STYLES = {
                    host: 'color:#fff;background:#6366f1;padding:1px 4px;border-radius:3px;font-weight:600',
                    child: 'color:#fff;background:#0ea5e9;padding:1px 4px;border-radius:3px;font-weight:600',
                };
                transports.push({ handle: function (e) {
                    var label = e.source.layer + (e.source.resourceId ? ':' + (e.source.resourceType || 'unknown') + ':' + e.source.resourceId : '');
                    var style = TAG_STYLES[e.source.layer] || TAG_STYLES.child;
                    var msg = '%c' + label + '%c ' + e.message;
                    var inline = [msg, style, ''];
                    if (e.extra && Object.keys(e.extra).length) inline.push(e.extra);
                    if (Object.keys(e.tags).length) inline.push(e.tags);
                    if (Object.keys(e.contexts).length) inline.push(e.contexts);
                    if (e.subAction === 'captureException' && e.error) {
                        var err = new Error(e.error.message); err.name = e.error.name;
                        if (e.error.stack) err.stack = e.error.stack;
                        inline.push(err);
                        console.error.apply(console, inline);
                        return;
                    }
                    if (e.callerStack) inline.push('\n' + e.callerStack);
                    if (e.level <= 3) console.error.apply(console, inline);
                    else if (e.level <= 4) console.warn.apply(console, inline);
                    else if (e.level <= 6) console.info.apply(console, inline);
                    else console.debug.apply(console, inline);
                }});

                function handleLog(m) {
                    var d = m.data, src = m.source || { layer: 'child' };
                    if (!d || typeof d !== 'object') return;
                    var sk = sourceKey(src), st = getState(sk);

                    switch (m.subAction) {
                        case 'addBreadcrumb': st.bc.push(d); if (st.bc.length > 100) st.bc.shift(); break;
                        case 'setContext': if (d.name) { if (d.data === null) delete st.ctx[d.name]; else st.ctx[d.name] = d.data; } break;
                        case 'setTag': if (d.key) { if (d.value === null) delete st.tags[d.key]; else st.tags[d.key] = d.value; } break;
                        case 'log': case 'captureException': case 'captureMessage':
                            var entry = {
                                subAction: m.subAction, level: d.level != null ? d.level : 6,
                                message: d.message || '', timestamp: m.timestamp || Date.now(),
                                source: src, breadcrumbs: st.bc.slice(),
                                contexts: Object.assign({}, st.ctx), tags: Object.assign({}, st.tags),
                            };
                            if (m.callerStack) entry.callerStack = m.callerStack;
                            if (d.extra) entry.extra = d.extra;
                            if (m.subAction === 'captureException') {
                                entry.error = { name: d.name || 'Error', message: d.message || '', stack: d.stack };
                                if (d.level == null) entry.level = 3;
                            }
                            for (var i = 0; i < transports.length; i++) transports[i].handle(entry);
                            break;
                    }
                }

                // Listen to log events from module.js globalEvents
                events.on('log', handleLog);

                // Sentry: load from CDN if PUBLIC_SENTRY_DSN is present
                import('/api/public/env/public.js').then(function (envMod) {
                    var pubEnv = envMod.default || envMod.__WIPPY_ENV__ || {};
                    if (pubEnv.PUBLIC_SENTRY_DSN) {
                        import('https://esm.sh/@sentry/browser').then(function (Sentry) {
                            Sentry.init({ dsn: pubEnv.PUBLIC_SENTRY_DSN, environment: pubEnv.PUBLIC_SENTRY_ENV || undefined });
                            transports.push({ handle: function (e) {
                                Sentry.withScope(function (scope) {
                                    scope.setTag('wippy.layer', e.source.layer);
                                    if (e.source.resourceId) scope.setTag('wippy.resourceId', e.source.resourceId);
                                    if (e.source.resourceType) scope.setTag('wippy.resourceType', e.source.resourceType);
                                    if (e.source.nestingDepth != null) scope.setTag('wippy.nestingDepth', String(e.source.nestingDepth));
                                    Object.keys(e.tags).forEach(function (k) { scope.setTag(k, e.tags[k]); });
                                    scope.setContext('wippy', e.source);
                                    Object.keys(e.contexts).forEach(function (k) { scope.setContext(k, e.contexts[k]); });
                                    function bcLevel(l) { return l <= 1 ? 'fatal' : l <= 3 ? 'error' : l <= 4 ? 'warning' : l <= 6 ? 'info' : 'debug'; }
                                    e.breadcrumbs.forEach(function (bc) { Sentry.addBreadcrumb({ category: bc.category, message: bc.message, data: bc.data, level: bcLevel(bc.level != null ? bc.level : 6), type: bc.type, timestamp: bc.timestamp ? bc.timestamp / 1000 : undefined }); });
                                    if (e.extra) scope.setExtras(e.extra);
                                    if (e.subAction === 'captureException' && e.error) {
                                        var err = new Error(e.error.message); err.name = e.error.name;
                                        if (e.error.stack) err.stack = e.error.stack;
                                        else if (e.callerStack) err.stack = e.callerStack;
                                        Sentry.captureException(err);
                                    } else {
                                        if (e.callerStack) scope.setExtra('callerStack', e.callerStack);
                                        var lvl = e.level <= 1 ? 'fatal' : e.level <= 3 ? 'error' : e.level <= 4 ? 'warning' : e.level <= 6 ? 'info' : 'debug';
                                        Sentry.captureMessage(e.message, lvl);
                                    }
                                });
                            }});
                        }).catch(function (err) { console.warn('Sentry CDN load failed:', err); });
                    }
                }).catch(function () { /* env endpoint unavailable */ });
            })();

        events.on('authExpired', function () {
            localStorage.removeItem(STORAGE_KEY);
            window.location.href = loginPath;
        });

        events.on('error', function (err) {
            console.error('Wippy critical error:', err);
            localStorage.removeItem(STORAGE_KEY);
            window.location.href = loginPath;
        });
    } catch (err) {
        console.error('Facade initialization failed:', err);
    }
    })();
</script>
</body>
</html>
