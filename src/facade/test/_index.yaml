version: "1.0"
namespace: app

entries:
  - name: gateway
    kind: http.service
    meta:
      comment: Test HTTP server
    addr: :19085
    lifecycle:
      auto_start: true

  - name: api.public
    kind: http.router
    meta:
      comment: Test public API router
      server: gateway
    prefix: /api/public

  - name: security_policy_test
    kind: function.lua
    meta:
      type: test
      suite: facade
      comment: Facade handler security policy tests
    source: file://security_policy_test.lua
    method: run
    imports:
      test: wippy.test:test
    modules:
      - security

  - name: config_handler_test
    kind: function.lua
    meta:
      type: test
      suite: facade
      comment: Config handler and dependency wiring tests
    source: file://config_dependency_test.lua
    method: run
    imports:
      test: wippy.test:test
    modules:
      - json
      - registry
