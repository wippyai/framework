version: "1.0"
namespace: wippy.facade

entries:
  - name: definition
    kind: ns.definition
    readme: file://README.md
    meta:
      title: Frontend Facade
      description: Portable iframe facade for Wippy frontend

  # Infrastructure requirements
  - name: server
    kind: ns.requirement
    meta:
      description: HTTP server for static and iframe serving
    targets:
      - entry: wippy.facade:static
        path: .meta.server
      - entry: wippy.facade:web_router
        path: .meta.server

  - name: router
    kind: ns.requirement
    meta:
      description: Public API router for config, CSS variable, and theme-persist endpoints
    targets:
      - entry: wippy.facade:config_endpoint
        path: .meta.router
      - entry: wippy.facade:css_vars_endpoint
        path: .meta.router
      - entry: wippy.facade:theme_persist_endpoint
        path: .meta.router

  - name: fe_facade_url
    kind: ns.requirement
    meta:
      description: CDN base URL for iframe frontend bundle
    targets:
      - entry: wippy.facade:fe_facade_url
        path: .default
    default: https://web-host.wippy.ai/webcomponents-1.0.42

  - name: fe_entry_path
    kind: ns.requirement
    meta:
      description: Iframe HTML entry point path
    targets:
      - entry: wippy.facade:fe_entry_path
        path: .default
    default: /iframe.html

  - name: fe_mode
    kind: ns.requirement
    meta:
      description: |
        Frontend bundle mode. `compat` (default) loads module.js and renders
        the standard Wippy host (sidebar + chat + pages + right panel).
        `managed` loads managed-layout.js and renders a declarative
        multi-panel host defined by hostConfig.layout — no default chrome.
    targets:
      - entry: wippy.facade:fe_mode
        path: .default
    default: compat

  # App identity
  - name: app_title
    kind: ns.requirement
    meta:
      description: App title shown in sidebar
    targets:
      - entry: wippy.facade:app_title
        path: .default
    default: Wippy

  - name: app_name
    kind: ns.requirement
    meta:
      description: Full application name
    targets:
      - entry: wippy.facade:app_name
        path: .default
    default: Wippy AI

  - name: app_icon
    kind: ns.requirement
    meta:
      description: Iconify icon reference
    targets:
      - entry: wippy.facade:app_icon
        path: .default
    default: "wippy:logo"

  # Feature flags
  - name: show_admin
    kind: ns.requirement
    meta:
      description: Show admin panel toggle
    targets:
      - entry: wippy.facade:show_admin
        path: .default
    default: "true"

  - name: start_nav_open
    kind: ns.requirement
    meta:
      description: Navigation drawer open by default
    targets:
      - entry: wippy.facade:start_nav_open
        path: .default
    default: "false"

  - name: allow_select_model
    kind: ns.requirement
    meta:
      description: Allow user to select LLM model
    targets:
      - entry: wippy.facade:allow_select_model
        path: .default
    default: "false"

  - name: hide_nav_bar
    kind: ns.requirement
    meta:
      description: Completely hide the left navigation sidebar
    targets:
      - entry: wippy.facade:hide_nav_bar
        path: .default
    default: "false"

  - name: disable_right_panel
    kind: ns.requirement
    meta:
      description: Disable the right sidebar panel
    targets:
      - entry: wippy.facade:disable_right_panel
        path: .default
    default: "false"

  - name: session_type
    kind: ns.requirement
    meta:
      description: Chat session persistence type
    targets:
      - entry: wippy.facade:session_type
        path: .default
    default: non-persistent

  - name: history_mode
    kind: ns.requirement
    meta:
      description: Browser history mode (hash or history)
    targets:
      - entry: wippy.facade:history_mode
        path: .default
    default: hash

  - name: theme_mode
    kind: ns.requirement
    meta:
      description: |
        Forced theme mode for the host and all children. "auto" (default)
        follows the OS prefers-color-scheme; "light"/"dark" force a theme
        regardless of OS (applied via w-theme-light/w-theme-dark classes).
    targets:
      - entry: wippy.facade:theme_mode
        path: .default
    default: auto

  - name: theme_persist
    kind: ns.requirement
    meta:
      description: |
        Where the user's chosen theme mode is persisted across reloads.
        "none" (default) keeps the current behavior (theme always comes from
        theme_mode). "cookie" stores it in a cookie — the Jet shell reads it
        server-side and renders the w-theme-* class before paint (no flash).
        "localStorage" stores it client-side (a brief flash is unavoidable; the
        server can't read it). The store name is theme_storage_key. The facade
        serves a ready-made script at /facade/theme-persist.js that applies and
        writes the value; the host shell and login/non-host pages just include it.
    targets:
      - entry: wippy.facade:theme_persist
        path: .default
    default: none

  - name: theme_storage_key
    kind: ns.requirement
    meta:
      description: |
        Cookie / localStorage key used to persist the theme mode when
        theme_persist is "cookie" or "localStorage". Returned in /facade/config
        as themeStorageKey and baked into /facade/theme-persist.js so non-Wippy
        pages share the same key.
    targets:
      - entry: wippy.facade:theme_storage_key
        path: .default
    default: "@wippy-theme-mode"

  # Auth
  - name: login_path
    kind: ns.requirement
    meta:
      description: Path to redirect unauthenticated users
    targets:
      - entry: wippy.facade:login_path
        path: .default
    default: /login.html

  - name: login_redirect_param
    kind: ns.requirement
    meta:
      description: |
        Query param name appended to login_path with the current page's
        relative URL (path + search + hash), so the login flow can return the
        user to the originally requested page after authentication. Empty
        disables. Common values: "redirect_to", "next", "return_to".
    targets:
      - entry: wippy.facade:login_redirect_param
        path: .default
    default: ""

  # Theming — global scope (applied to both host and children)
  - name: custom_css
    kind: ns.requirement
    meta:
      description: "Global CSS: applied to host chrome AND child iframes"
    targets:
      - entry: wippy.facade:custom_css
        path: .default
    default: "@import url('https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');"

  - name: css_variables
    kind: ns.requirement
    meta:
      description: "Global CSS variables as JSON: applied to host AND children (e.g. {\"--p-primary\":\"#6366f1\"})"
    targets:
      - entry: wippy.facade:css_variables
        path: .default
    default: "{}"

  - name: icon_sets
    kind: ns.requirement
    meta:
      description: "Global Iconify icon sets as JSON ({prefix:{name:{body,width,height}}}). e.g. {\"custom\":{\"logo\":{...}}}"
    targets:
      - entry: wippy.facade:icon_sets
        path: .default
    default: "{}"

  # Theming — host scope (applied to host chrome ONLY, not children)
  - name: host_custom_css
    kind: ns.requirement
    meta:
      description: "Host-only CSS: sidebar, chat, nav — NOT applied to child iframes"
    targets:
      - entry: wippy.facade:host_custom_css
        path: .default
    default: ""

  - name: host_css_variables
    kind: ns.requirement
    meta:
      description: "Host-only CSS variables as JSON: override global vars for host chrome only"
    targets:
      - entry: wippy.facade:host_css_variables
        path: .default
    default: "{}"

  - name: host_icon_sets
    kind: ns.requirement
    meta:
      description: "Host-only Iconify icon sets as JSON ({prefix:{name:{body,width,height}}}). Host chrome only."
    targets:
      - entry: wippy.facade:host_icon_sets
        path: .default
    default: "{}"

  # Theming — children scope (applied to child iframes ONLY, not host)
  - name: children_custom_css
    kind: ns.requirement
    meta:
      description: "Children-only CSS: applied to child iframes only, NOT to host chrome"
    targets:
      - entry: wippy.facade:children_custom_css
        path: .default
    default: ""

  - name: children_css_variables
    kind: ns.requirement
    meta:
      description: "Children-only CSS variables as JSON: override global vars for child iframes only"
    targets:
      - entry: wippy.facade:children_css_variables
        path: .default
    default: "{}"

  - name: content_fs
    kind: ns.requirement
    meta:
      description: |
        fs.directory entry ID whose files can be referenced via "file://" in CSS and
        JSON requirements. When set, any requirement value of the form "file://path"
        is resolved to that file's content at request time. The same fs.directory can
        also be served as a static endpoint so pages like login.html can <link> the
        same CSS files directly. Example: "app:theming_files".
    targets:
      - entry: wippy.facade:content_fs
        path: .default
    default: ""

  # Additional hostConfig options (JSON)
  - name: hide_session_selector
    kind: ns.requirement
    meta:
      description: Hide the chat session selector dropdown
    targets:
      - entry: wippy.facade:hide_session_selector
        path: .default
    default: "false"

  - name: api_routes
    kind: ns.requirement
    meta:
      description: "API route overrides as JSON (e.g. {\"agents\":{\"list\":\"/custom/agents\"}})"
    targets:
      - entry: wippy.facade:api_routes
        path: .default
    default: "{}"

  - name: additional_nav_items
    kind: ns.requirement
    meta:
      description: "Extra sidebar nav items as JSON array (e.g. [{\"id\":\"x\",\"name\":\"X\",\"title\":\"X\",\"icon\":\"tabler:x\",\"order\":10}])"
    targets:
      - entry: wippy.facade:additional_nav_items
        path: .default
    default: "[]"

  - name: state_cache
    kind: ns.requirement
    meta:
      description: "Child state LRU cache config as JSON (e.g. {\"maxPages\":50,\"maxSizePerPage\":1048576})"
    targets:
      - entry: wippy.facade:state_cache
        path: .default
    default: "{}"

  - name: allow_additional_tags
    kind: ns.requirement
    meta:
      description: "HTML sanitizer tag whitelist as JSON (e.g. {\"w-chart\":[\"data\",\"type\"]})"
    targets:
      - entry: wippy.facade:allow_additional_tags
        path: .default
    default: "{}"

  - name: chat
    kind: ns.requirement
    meta:
      description: "Chat config as JSON (e.g. {\"convertPasteToFile\":{\"enabled\":true,\"minFileSize\":1024,\"allowHtml\":false}})"
    targets:
      - entry: wippy.facade:chat
        path: .default
    default: "{}"

  - name: host_config_layout
    kind: ns.requirement
    meta:
      description: |
        Managed-layout HostLayoutDeclaration as JSON string. Only relevant
        when fe_mode = "managed". Top-level keys: layouts (required),
        breakpoints, panels, floating, modals, services, dragEnabled.
        Empty (default `{}`) leaves hostConfig.layout unset so the host
        falls back to its URL-param / parent-SetConfig configuration paths.
        See gen-2-chat/managed-layout.md for the schema.
    targets:
      - entry: wippy.facade:host_config_layout
        path: .default
    default: "{}"

  - name: axios_defaults
    kind: ns.requirement
    meta:
      description: "Axios HTTP defaults as JSON (e.g. {\"timeout\":30000,\"headers\":{\"X-Custom\":\"value\"}})"
    targets:
      - entry: wippy.facade:axios_defaults
        path: .default
    default: "{}"

  - name: tanstack
    kind: ns.requirement
    meta:
      description: "TanStack Query default options as JSON: { default?, content?, lists? }. `default` applies to every query; `content` targets single-resource renders (page/artifact/session/entry/model/upload), `lists` targets navigation/index queries. Each is a JSON-safe subset of query options (refetchOnWindowFocus, refetchOnReconnect, refetchOnMount, staleTime, gcTime, retry, refetchInterval). Default behavior (no config) is refetchOnWindowFocus:false. e.g. {\"lists\":{\"refetchOnWindowFocus\":true}}"
    targets:
      - entry: wippy.facade:tanstack
        path: .default
    default: "{}"

  - name: extra_scripts
    kind: ns.requirement
    meta:
      description: "External scripts injected into facade index.html before the Web Host bundle loads. JSON array of strings (src shorthand) or objects ({\"src\":\"...\",\"async\":true,\"defer\":true,\"type\":\"module\",\"crossorigin\":\"anonymous\",\"integrity\":\"...\"}). e.g. [\"/script.js\",{\"src\":\"https://cdn.example.com/x.js\",\"defer\":true}]"
    targets:
      - entry: wippy.facade:extra_scripts
        path: .default
    default: "[]"

  # Static files
  - name: public_files
    kind: fs.directory
    meta:
      comment: Facade static files (index.html)
    directory: ./public/
    mode: "0755"

  # Serves facade static assets (@wippy-fe/loading.js) and is the SPA fallback
  # for history-mode deep links. The Jet shell endpoints below match only the
  # exact "/" and "/index.html" (Go 1.22 "{$}" = exact match), a strict subset
  # of this catch-all, so they win for those paths without shadowing assets.
  - name: static
    kind: http.static
    meta:
      comment: Serves facade assets (@wippy-fe/*) + SPA fallback
      server: server
    fs: public_files
    directory: /
    path: /
    options:
      index: index.html
      spa: true

  # Jet-rendered shell (index.html) — server-side theme cookie application
  # Root router for the Jet shell. Endpoints use exact-match paths ("/{$}" and
  # "/index.html") so they only intercept those two routes; the /api/public API
  # router and the "/" static catch-all handle everything else.
  - name: web_router
    kind: http.router
    meta:
      comment: Root router for the Jet-rendered facade shell
      server: server
    prefix: /

  - name: templates
    kind: template.set
    meta:
      comment: Facade Jet template set (shell)

  - name: index
    kind: template.jet
    meta:
      content_type: text/html
      comment: Facade shell template — conditionally bakes the theme class onto <html>
    source: file://index.jet
    set: wippy.facade:templates

  - name: index_handler
    kind: function.lua
    meta:
      comment: Renders the facade shell; applies the persisted theme from the request cookie (cookie mode)
    source: file://index_handler.lua
    method: handler
    modules:
      - http
      - registry
      - templates
    security:
      actor:
        id: wippy.facade:index_handler
      policies:
        - wippy.facade:config_read_runtime

  - name: index_endpoint
    kind: http.endpoint
    meta:
      router: web_router
    method: GET
    path: /{$}
    func: index_handler

  - name: index_html_endpoint
    kind: http.endpoint
    meta:
      router: web_router
    method: GET
    path: /index.html
    func: index_handler

  # Optional view-config resolution contract (bound by the application, if at all)
  - name: resolver
    kind: contract.definition
    meta:
      comment: Optional view-config resolution contract — override facade requirement values at request time
      description: |
        Optional contract for overriding facade requirement values (css_variables,
        custom_css, app_title, app_icon, theme_mode, ...) at request time. An
        application binds an implementation to drive the view config from runtime
        state (settings, per-tenant branding). When no binding exists, the facade
        config and CSS-vars handlers fall back to the static ns.requirement defaults
        — detected structurally via :implementations() (an empty list), not by
        inspecting the contract open error. Runs under the request's ambient actor.
    methods:
      - name: resolve
        description: |
          Return a map of facade requirement name -> override value (string). Values
          use the same format as the static requirement default (JSON-encoded for the
          JSON requirements such as css_variables). Omitted keys fall back to the
          static default.
        input_schemas:
          - definition: |
              {
                "type": "object",
                "description": "Optional resolution context (reserved; empty today)."
              }
            format: application/schema+json
        output_schemas:
          - definition: |
              {
                "type": "object",
                "description": "Map of facade requirement name to override value string; omitted keys fall back to the static ns.requirement default.",
                "additionalProperties": { "type": "string" }
              }
            format: application/schema+json

  # Shared helpers: file:// resolution and CSS variable generation
  - name: theming_helpers
    kind: library.lua
    meta:
      comment: File-ref resolution and CSS variable generation shared by config and CSS-vars handlers
    source: file://theming_helpers.lua
    modules:
      - fs
      - json
      - registry
      - contract

  # Config endpoint
  - name: config_handler
    kind: function.lua
    meta:
      comment: Returns facade configuration as JSON
    source: file://config_handler.lua
    method: handler
    imports:
      theming_helpers: wippy.facade:theming_helpers
    modules:
      - http
      - registry
      - json
      - env
      - fs
    security:
      actor:
        id: wippy.facade:config_handler
      policies:
        - wippy.facade:config_read_runtime
        - wippy.facade:content_fs_runtime

  - name: config_endpoint
    kind: http.endpoint
    meta:
      router: router
    method: GET
    path: /facade/config
    func: config_handler

  # CSS variables endpoint
  - name: css_vars_handler
    kind: function.lua
    meta:
      comment: Returns global CSS variables as a text/css stylesheet for use in non-Wippy-Host pages
    source: file://css_vars_handler.lua
    method: handler
    imports:
      theming_helpers: wippy.facade:theming_helpers
    modules:
      - http
      - registry
      - fs
    security:
      actor:
        id: wippy.facade:css_vars_handler
      policies:
        - wippy.facade:config_read_runtime
        - wippy.facade:content_fs_runtime

  - name: css_vars_endpoint
    kind: http.endpoint
    meta:
      router: router
    method: GET
    path: /facade/variables.css
    func: css_vars_handler

  # Theme-persistence script endpoint
  - name: theme_persist_handler
    kind: function.lua
    meta:
      comment: Serves /facade/theme-persist.js — early-apply + window.wippyThemePersist with key/mode baked in
    source: file://theme_persist_handler.lua
    method: handler
    modules:
      - http
      - registry
      - json
    security:
      actor:
        id: wippy.facade:theme_persist_handler
      policies:
        - wippy.facade:config_read_runtime

  - name: theme_persist_endpoint
    kind: http.endpoint
    meta:
      router: router
    method: GET
    path: /facade/theme-persist.js
    func: theme_persist_handler

  - name: config_read_runtime
    kind: security.policy
    meta:
      comment: Facade handlers read their own declarative config and public API URL.
    policy:
      resources:
        - wippy.facade:*
        - PUBLIC_API_URL
      actions:
        - registry.get
        - env.get
      effect: allow

  - name: content_fs_runtime
    kind: security.policy
    meta:
      comment: Facade handlers may open the configured content filesystem to resolve fs:// theming references.
    policy:
      resources: '*'
      actions:
        - fs.get
      effect: allow

  - name: dep.wippy.test
    kind: ns.dependency
    meta:
      scope: dev
    component: wippy/test
    version: "*"

  # Tests
  - name: config_handler_test
    kind: function.lua
    meta:
      type: test
      suite: facade
      comment: Config handler tests
    source: file://config_handler_test.lua
    method: run
    imports:
      test: wippy.test:test
    modules:
      - json
      - registry

  - name: security_policy_test
    kind: function.lua
    meta:
      type: test
      suite: facade
      comment: Facade handler security policy tests
    source: file://security_policy_test.lua
    method: run
    imports:
      test: wippy.test:test
    modules:
      - security

  - name: theming_helpers_test
    kind: function.lua
    meta:
      type: test
      suite: facade
      comment: Tests for theming_helpers (CSS generation + file-ref resolution)
    source: file://theming_helpers_test.lua
    method: run
    imports:
      test: wippy.test:test
      theming_helpers: wippy.facade:theming_helpers
    modules:
      - fs
      - json
