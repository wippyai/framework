version: "1.0"
namespace: app

entries:
  - name: db
    kind: db.sql.sqlite
    meta:
      comment: In-memory database for usage tests
    file: ":memory:"

  - name: env_storage
    kind: env.storage.file
    meta:
      type: envstorage
    file_path: ./.wippy/test.env
    auto_create: true

  - name: processes
    kind: process.host
    lifecycle:
      auto_start: true
