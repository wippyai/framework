version: "1.0"
namespace: app

entries:
  - name: env_storage
    kind: env.storage.os
    meta:
      type: envstorage

  - name: dep.wippy.llm
    kind: ns.dependency
    meta:
      description: "LLM configuration for testing"
    component: "wippy/llm"
    parameters:
      - name: process_host
        value: wippy.terminal:host
      - name: env_storage
        value: app:env_storage
