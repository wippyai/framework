version: "1.0"
namespace: wippy.test

entries:
  - name: definition
    kind: ns.definition
    readme: file://README.md
    meta:
      title: Test Framework
      description: BDD-style testing framework for Lua applications

  - name: terminal
    kind: ns.dependency
    component: wippy/terminal
    version: "*"

  - name: registry
    kind: library.lua
    meta:
      comment: Registry queries for test discovery and organization
    source: file://registry.lua
    modules:
      - time
    imports:
      base_registry: :registry

  - name: test
    kind: library.lua
    meta:
      comment: BDD-style testing framework with operation progress reporting
    source: file://test.lua
    modules:
      - time
      - json

  - name: runner
    kind: process.lua
    meta:
      comment: CLI test runner with live progress display
      command:
        name: test
        short: Run all tests with meta.type=test
    source: file://runner.lua
    method: main
    modules:
      - io
      - registry
      - funcs
      - time
